<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Feliz Cumpleaños - Todos los Audios + Canción</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/5.0.0/normalize.min.css">
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }
    :root {
      --tongue: #c12115;
      --pupil: #fff;
      --stroke: #1a1a1a;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
      }
    }

    body {
      --frosting: hsl(var(--frosting-hue, 0), 100%, 55%);
      --lightness: 50;
      --flame: 0;
      --glow-hue: 40;
      --glow-saturation: 50;
      --glow-lightness: 35;
      --glow-alpha: 0.4;
      --transparency-alpha: 0;
      --glow: hsla(var(--glow-hue), calc(var(--glow-saturation) * 1%), calc(var(--glow-lightness) * 1%), var(--glow-alpha));
      --transparent: hsla(0, 0%, 0%, var(--transparency-alpha));
      display: flex;
      overflow: hidden;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
      background-image: url('https://png.pngtree.com/background/20250105/original/pngtree-happy-birthday-background-picture-image_15462990.jpg');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      margin: 0;
      padding: 0;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 1000;
      opacity: calc(1 - var(--lightness, 50) / 50);
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .birthday-button {
      position: relative;
      transform: scale(0.6);
      cursor: pointer;
      z-index: 1001; 
    }

    .birthday-button__text {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      display: flex;
      text-align: center;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 700;
      color: #fff !important;
      text-shadow: 0px 2px 5px rgba(0, 0, 0, 0.5);
    }
    .birthday-button__text .char {
      display: inline-block;
      color: hsl(var(--hue, 0), calc(var(--char-sat, 0) * 1%), calc(var(--char-light, 0) * 1%));
    }
    .birthday-button:before {
      content: '';
      position: absolute;
      height: 240px;
      width: 240px;
      background: radial-gradient(var(--glow), var(--transparent) 30%), radial-gradient(var(--glow), var(--transparent) 50%);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -70%) scale(calc(var(--flame) * 3));
      z-index: 2;
      filter: blur(15px);
      opacity: var(--flame);
    }
    .birthday-button:after {
      content: '';
      height: 30px;
      width: 400px;
      filter: blur(15px);
      position: absolute;
      background: radial-gradient(var(--glow), var(--transparent) 20%), radial-gradient(var(--glow), var(--transparent));
      top: 100%;
      left: 50%;
      transform: translate(-50%, -50%) scale(calc(var(--flame) * 1));
      opacity: var(--flame);
    }
    .birthday-button__button {
      width: 400px;
      height: 150px;
      position: relative;
      border: 0;
      border-radius: 25px;
      cursor: pointer;
      background: linear-gradient(45deg, #FF7E9B, #FFB899);
      box-shadow: 0 5px 20px -5px rgba(255, 126, 155, 0.8);
      transition: all 0.2s ease-in-out;
    }
    .birthday-button__button:active {
      transform: scale(0.97);
    }
    .birthday-button__button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    .birthday-button__cake {
      position: absolute; 
      width: 480px;    
      height: auto;      
      left: 50%;          
      transform: translateX(-50%); 
      bottom: -1px;        
    }

    /* Textos de felicitación - ajustados para que no estén pegados */
    .texts-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 600px;
      text-align: center;
      pointer-events: none;
      z-index: 10;
      margin-top: 180px; /* Separación del pastel */
    }
    
    .glowing-text {
      display: block;
      width: 100%;
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      color: #ffebb3;
      text-shadow:
        0 0 5px #fff,
        0 0 10px #ffc400,
        0 0 20px #ff9a00, 
        0 0 40px #ff9a00;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
      margin: 0;
      line-height: 1.3;
    }
    
    .glowing-text.primero {
      margin-bottom: 20px;
    }
    
    .glowing-text.segundo {
      margin-top: 20px;
      font-size: 2rem;
    }

    .cake__eye-body {
      fill: var(--stroke);
    }
    .cake__eye-pupil {
      fill: var(--pupil);
    }
    .cake__tongue {
      fill: var(--tongue);
    }
    .cake__mouth-opening {
      fill: var(--stroke);
      stroke: var(--stroke);
    }
    .cake__sprinkle {
      --sprinkle: hsl(var(--sprinkle-hue, 0), 100%, 75%);
      fill: var(--sprinkle);
    }
    .cake__frosting--start {
      fill: var(--frosting);
    }
    .cake__frosting--duplicate {
      fill: var(--frosting);
    }
    .candle__flame {
      opacity: var(--flame, 0);
    }
    .candle__flame-outer {
      fill: #ff711f;
    }
    .candle__flame-inner {
      fill: #edca1d;
    }
    .face__stroke {
      stroke: var(--stroke);
    }
    .cake__candle:nth-of-type(1) {
      --flame: 0;
    }
    .cake__candle:nth-of-type(2) {
      --flame: 0;
    }
    .cake__candle:nth-of-type(3) {
      --flame: 0;
    }
    
    .music-control-btn {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #ff6b6b, #c0392b);
      border: none;
      border-radius: 60px;
      padding: 14px 32px;
      font-size: 1.3rem;
      font-weight: bold;
      font-family: 'Dancing Script', cursive;
      color: white;
      cursor: pointer;
      z-index: 1002;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 12px;
      backdrop-filter: blur(4px);
    }
    .music-control-btn:hover {
      transform: translateX(-50%) scale(1.02);
      background: linear-gradient(135deg, #ff8a8a, #e74c3c);
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }
    .music-control-btn:active {
      transform: translateX(-50%) scale(0.98);
    }
    .music-icon {
      font-size: 1.6rem;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
    }

    .confetti-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
    }
    .heart-confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      background-color: var(--heart-color);
      top: -20px;
      animation: fall 5s linear forwards;
      transform: rotate(45deg);
    }
    .heart-confetti::before,
    .heart-confetti::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      background-color: inherit;
      border-radius: 50%;
    }
    .heart-confetti::before {
      top: -5px;
      left: 0;
    }
    .heart-confetti::after {
      top: 0;
      left: -5px;
    }
    
    @media (max-width: 600px) {
      .birthday-button__button {
        width: 280px;
        height: 110px;
      }
      .birthday-button__cake {
        width: 340px;
      }
      .birthday-button__text {
        font-size: 1.6rem;
      }
      .texts-container {
        margin-top: 140px;
        width: 95%;
      }
      .glowing-text {
        font-size: 1.5rem;
      }
      .glowing-text.segundo {
        font-size: 1.4rem;
        margin-top: 15px;
      }
      .music-control-btn {
        padding: 10px 22px;
        font-size: 1rem;
        bottom: 20px;
      }
      .music-icon {
        font-size: 1.3rem;
      }
    }
    
    @media (min-width: 601px) and (max-width: 900px) {
      .texts-container {
        margin-top: 160px;
      }
      .glowing-text {
        font-size: 1.9rem;
      }
      .glowing-text.segundo {
        font-size: 1.7rem;
      }
    }
  </style>
</head>

<button id="musicToggleBtn" class="music-control-btn">
  <span class="music-icon">🎵</span>
  <span id="musicBtnText">Reproducir Canción</span>
</button>

<script src='https://cdnjs.cloudflare.com/ajax/libs/gsap/3.2.6/gsap.min.js'></script>
<script src='https://unpkg.com/splitting/dist/splitting.min.js'></script>
<script src='https://s3-us-west-2.amazonaws.com/s.cdpn.io/16327/MorphSVGPlugin3.min.js'></script>
<script>
  (function(){
    Splitting();
    
    const AUDIO_BG_URL = 'https://mp3tourl.com/audio/1777765333818-5c6c0d25-51ac-4d32-b7cb-d59b95586135.mp3';
    
    let bgAudio = null;
    let isBgPlaying = false;
    
    const musicBtn = document.getElementById('musicToggleBtn');
    const musicBtnText = document.getElementById('musicBtnText');
    
    function initBgAudio() {
      if(!bgAudio) {
        bgAudio = new Audio(AUDIO_BG_URL);
        bgAudio.loop = true;
        bgAudio.volume = 0.65;
        bgAudio.preload = 'auto';
      }
    }
    
    function startBgMusic() {
      if(!bgAudio) initBgAudio();
      if(bgAudio) {
        bgAudio.play().then(() => {
          isBgPlaying = true;
          musicBtnText.innerText = 'Pausar Canción';
          musicBtn.style.background = "linear-gradient(135deg, #2ecc71, #27ae60)";
        }).catch(e => console.log("Error audio fondo:", e));
      }
    }
    
    function pauseBgMusic() {
      if(bgAudio) {
        bgAudio.pause();
        isBgPlaying = false;
        musicBtnText.innerText = 'Reproducir Canción';
        musicBtn.style.background = "linear-gradient(135deg, #ff6b6b, #c0392b)";
      }
    }
    
    function toggleBgMusic() {
      if(!bgAudio) initBgAudio();
      if(isBgPlaying) {
        pauseBgMusic();
      } else {
        startBgMusic();
      }
    }
    
    musicBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleBgMusic();
    });
    
    const SOUNDS = {
      CHEER: new Audio('https://s3-us-west-2.amazonaws.com/s.cdpn.io/605876/cheer.mp3'),
      MATCH: new Audio('https://s3-us-west-2.amazonaws.com/s.cdpn.io/605876/match-strike-trimmed.mp3'),
      TUNE: new Audio('https://s3-us-west-2.amazonaws.com/s.cdpn.io/605876/happy-birthday-trimmed.mp3'),
      ON: new Audio('https://assets.codepen.io/605876/switch-on.mp3'),
      BLOW: new Audio('https://s3-us-west-2.amazonaws.com/s.cdpn.io/605876/blow-out.mp3'),
      POP: new Audio('https://s3-us-west-2.amazonaws.com/s.cdpn.io/605876/pop-trimmed.mp3'),
      HORN: new Audio('https://s3-us-west-2.amazonaws.com/s.cdpn.io/605876/horn.mp3')
    };
    
    document.addEventListener('click', () => {
      Object.values(SOUNDS).forEach(sound => {
        sound.muted = false;
        sound.play().catch(() => {});
        sound.pause();
        sound.currentTime = 0;
      });
    }, { once: true });
    
    const btn = document.querySelector('#celebrateBtn');
    const eyes = document.querySelector('.cake__eyes');
    
    const blinkEyes = (target) => {
      gsap.set(target, { scaleY: 1 });
      if(target.blinkTimeline) target.blinkTimeline.kill();
      target.blinkTimeline = new gsap.timeline({
        delay: Math.floor(Math.random() * 4) + 1,
        onComplete: () => blinkEyes(target)
      });
      target.blinkTimeline.to(target, {
        duration: 0.05,
        transformOrigin: '50% 50%',
        scaleY: 0,
        yoyo: true,
        repeat: 1
      });
    };
    blinkEyes(eyes);
    
    function dropConfetti() {
      const container = document.querySelector('.confetti-container');
      const colors = ['#f67280', '#c06c84', '#f8b195', '#ffffff', '#ffb347', '#ff6f61'];
      for(let i = 0; i < 130; i++) {
        const piece = document.createElement('div');
        piece.classList.add('heart-confetti');
        piece.style.setProperty('--heart-color', colors[Math.floor(Math.random() * colors.length)]);
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.animationDuration = Math.random() * 3 + 3 + 's';
        piece.style.animationDelay = Math.random() * 1 + 's';
        container.appendChild(piece);
        piece.addEventListener('animationend', () => piece.remove());
      }
    }
    
    const frostingTl = () => gsap.timeline()
      .to('#frosting', { scaleX: 1.015, duration: 0.25 }, 0)
      .to('#frosting', { scaleY: 1, duration: 1 }, 0)
      .to('#frosting', { duration: 1, morphSVG: '.cake__frosting--end' }, 0);
    
    const sprinklesTl = () => gsap.timeline()
      .to('.cake__sprinkle', { scale: 1, duration: 0.06, stagger: 0.02 });
    
    const spinTl = () => gsap.timeline()
      .set('.cake__frosting-patch', { display: 'block' })
      .to(['.cake__frosting--duplicate', '.cake__sprinkles--duplicate'], { x: 0, duration: 1 }, 0)
      .to(['.cake__frosting--start', '.cake__sprinkles--initial'], { x: 65, duration: 1 }, 0)
      .to('.cake__face', { duration: 1, x: -48.82 }, 0);
    
    const flickerTl = gsap.timeline()
      .to('.candle__flame-outer', { duration: 0.1, repeat: -1, yoyo: true, morphSVG: '#flame-outer' })
      .to('.candle__flame-inner', { duration: 0.1, repeat: -1, yoyo: true, morphSVG: '#flame-inner' }, 0);
    
    const shakeTl = () => gsap.timeline({ delay: 0.5 })
      .set('.cake__face', { display: 'none' })
      .set('.cake__face--straining', { display: 'block' })
      .to('.birthday-button', {
        onComplete: () => {
          gsap.set('.cake__face--straining', { display: 'none' });
          gsap.set('.cake__face', { display: 'block' });
        },
        x: 1, y: 1, repeat: 13, duration: 0.1
      }, 0)
      .to('.cake__candle', {
        onStart: () => {
          SOUNDS.POP.play();
          gsap.delayedCall(0.2, () => SOUNDS.POP.play());
          gsap.delayedCall(0.4, () => SOUNDS.POP.play());
        },
        ease: 'Elastic.easeOut',
        duration: 0.2,
        stagger: 0.2,
        scaleY: 1
      }, 0.2);
    
    const flameTl = () => gsap.timeline()
      .to('.cake__candle', { '--flame': 1, stagger: 0.2, duration: 0.1 })
      .to('body', { '--flame': 1, '--lightness': 5, duration: 0.2, delay: 0.2 });
    
    const lightsOutTl = () => gsap.timeline()
      .to('body', {
        onStart: () => { SOUNDS.BLOW.play(); },
        delay: 0.5,
        '--lightness': 0,
        duration: 0.3
      });
    
    const resetWorld = () => {
      const confettiDiv = document.querySelector('.confetti-container');
      if(confettiDiv) confettiDiv.innerHTML = '';
      gsap.set('.char', { '--hue': () => Math.random() * 360, '--char-sat': 0, '--char-light': 0, x: 0, y: 0, opacity: 1 });
      gsap.set('body', { '--frosting-hue': Math.random() * 360, '--glow-saturation': 50, '--glow-lightness': 35, '--glow-alpha': 0.4, '--transparency-alpha': 0, '--flame': 0 });
      gsap.set('.cake__candle', { '--flame': 0 });
      gsap.to('body', { '--lightness': 50, duration: 0.25 });
      gsap.set('.cake__frosting--end', { opacity: 0 });
      gsap.set('#frosting', { transformOrigin: '50% 10%', scaleX: 0, scaleY: 0 });
      gsap.set('.cake__frosting-patch', { display: 'none' });
      gsap.set(['.cake__frosting--duplicate', '.cake__sprinkles--duplicate'], { x: -65 });
      gsap.set('.cake__face', { x: -110 });
      gsap.set('.cake__face--straining', { display: 'none' });
      gsap.set('.cake__sprinkle', { '--sprinkle-hue': () => Math.random() * 360, scale: 0, transformOrigin: '50% 50%' });
      gsap.set('.birthday-button', { scale: 0.6, x: 0, y: 0 });
      gsap.set('.birthday-button__cake', { display: 'none' });
      gsap.set('.cake__candle', { scaleY: 0, transformOrigin: '50% 100%' });
    };
    
    resetWorld();
    
    let animActive = false;
    const masterTimeline = gsap.timeline({
      onStart: () => {
        SOUNDS.ON.play();
        dropConfetti();
      },
      onComplete: () => {
        gsap.delayedCall(2, () => {
          resetWorld();
          btn.removeAttribute('disabled');
          animActive = false;
        });
      },
      paused: true
    });
    
    masterTimeline.set('.birthday-button__cake', { display: 'block' })
      .to('.birthday-button', {
        onStart: () => {
          SOUNDS.CHEER.play();
          dropConfetti();
        },
        scale: 1,
        duration: 0.2
      }, 0)
      .to('.char', { '--char-sat': 70, '--char-light': 65, duration: 0.2 }, 0)
      .to('.char', {
        onStart: () => SOUNDS.HORN.play(),
        delay: 0.75,
        y: () => gsap.utils.random(-100, -200),
        x: () => gsap.utils.random(-50, 50),
        duration: () => gsap.utils.random(0.5, 1)
      })
      .to('.char', { opacity: 0, duration: 0.25 }, '>-0.5')
      .add(frostingTl())
      .add(sprinklesTl())
      .add(spinTl())
      .add(shakeTl())
      .add(flameTl(), 'FLAME_ON')
      .to('.glowing-text', { opacity: 1, duration: 1.5 }, '>-0.5')
      .add(lightsOutTl(), 'LIGHTS_OUT');
    
    SOUNDS.TUNE.onended = SOUNDS.MATCH.onended = () => masterTimeline.play();
    masterTimeline.addPause('FLAME_ON', () => SOUNDS.MATCH.play());
    masterTimeline.addPause('LIGHTS_OUT', () => SOUNDS.TUNE.play());
    
    btn.addEventListener('click', () => {
      if(animActive) return;
      animActive = true;
      btn.setAttribute('disabled', true);
      masterTimeline.restart();
    });
    
    Object.values(SOUNDS).forEach(s => { s.muted = true; });
    const tempUnmute = () => {
      Object.values(SOUNDS).forEach(s => { s.muted = false; });
      document.removeEventListener('click', tempUnmute);
    };
    document.addEventListener('click', tempUnmute, { once: true });
    
    initBgAudio();
    if(bgAudio) bgAudio.muted = true;
    const unmuteBg = () => {
      if(bgAudio) bgAudio.muted = false;
      document.removeEventListener('click', unmuteBg);
    };
    document.addEventListener('click', unmuteBg, { once: true });
  })();
</script>
</body>
</html>
